name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-coordinator:
    name: Coordinator Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Run tests
        run: cd coordinator && go test -race ./...
      - name: Check formatting
        run: |
          cd coordinator
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Unformatted files:"
            echo "$UNFORMATTED"
            exit 1
          fi

  test-provider:
    name: Provider Tests
    runs-on: macos-15
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          cd provider
          # Skip proxy and server integration tests — they require SIP enabled
          # which is not available on GitHub Actions macOS runners.
          # These tests run locally on real Macs via the pre-push hook.
          cargo test -- --skip proxy::tests --skip server::tests
      - name: Check formatting
        run: cd provider && cargo fmt --check
