name: Release Provider Bundle

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'
  DEVELOPER_ID: "Developer ID Application: Eigen Labs, Inc. (SLDQ2GJ6TL)"
  PBS_TAG: "20260408"
  PBS_PYTHON_VERSION: "3.12.13"

jobs:
  build-and-release:
    name: Build, Sign, Upload, Register
    runs-on: macos-26-xlarge  # Apple Silicon, 16 cores
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # --- Import signing certificate ---

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          # Decode certificate
          echo "$P12_BASE64" | base64 --decode > /tmp/cert.p12

          # Create temporary keychain
          security create-keychain -p "build" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "build" "$KEYCHAIN_PATH"

          # Add to search list (critical — without this, codesign can't find the cert)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Import certificate
          security import /tmp/cert.p12 -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -f pkcs12

          # Allow codesign to access the keychain without UI prompt
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "build" "$KEYCHAIN_PATH"

          # Verify identity is available
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # Store path for later steps
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          # Clean up
          rm /tmp/cert.p12

      # --- Build ---

      - name: Prepare portable Python for provider build
        run: |
          curl -fsSL "https://github.com/astral-sh/python-build-standalone/releases/download/${PBS_TAG}/cpython-${PBS_PYTHON_VERSION}+${PBS_TAG}-aarch64-apple-darwin-install_only.tar.gz" \
            -o /tmp/build-python.tar.gz
          rm -rf /tmp/eigeninference-build-python
          mkdir -p /tmp/eigeninference-build-python
          tar xzf /tmp/build-python.tar.gz --strip-components=1 -C /tmp/eigeninference-build-python
          rm -f /tmp/build-python.tar.gz
          /tmp/eigeninference-build-python/bin/python3.12 --version

      - name: Build provider (Rust)
        env:
          PYO3_PYTHON: /tmp/eigeninference-build-python/bin/python3.12
        run: |
          cd provider
          cargo build --release

      - name: Build enclave (Swift)
        run: |
          cd enclave
          swift build -c release

      # Image generation support disabled — re-enable when ready
      # - name: Build gRPCServerCLI (Draw Things)
      #   run: |
      #     git clone --depth 1 https://github.com/drawthingsai/draw-things-community.git /tmp/draw-things-community
      #     cd /tmp/draw-things-community
      #     swift build -c release --product gRPCServerCLI
      #     cp .build/arm64-apple-macosx/release/gRPCServerCLI /tmp/gRPCServerCLI
      #     echo "gRPCServerCLI built: $(du -h /tmp/gRPCServerCLI | cut -f1)"

      # --- Test ---

      - name: Test provider
        env:
          PYO3_PYTHON: /tmp/eigeninference-build-python/bin/python3.12
        run: cd provider && cargo test -- --skip proxy::tests --skip server::tests

      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version-file: coordinator/go.mod

      - name: Test coordinator
        run: cd coordinator && go test -race ./...

      # --- Sign & Bundle ---

      - name: Sign binaries and create bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p /tmp/eigeninference-bundle/bin

          cp provider/target/release/darkbloom /tmp/eigeninference-bundle/bin/
          cp enclave/.build/release/eigeninference-enclave /tmp/eigeninference-bundle/bin/

          # Copy stt_server.py
          cp provider/stt_server.py /tmp/eigeninference-bundle/bin/

          # Bundle ffmpeg (installed via Homebrew which verifies bottle checksums)
          FFMPEG_BIN="$(brew --prefix ffmpeg 2>/dev/null)/bin/ffmpeg"
          if [ ! -f "$FFMPEG_BIN" ]; then
            brew install --quiet ffmpeg
            FFMPEG_BIN="$(brew --prefix ffmpeg)/bin/ffmpeg"
          fi
          cp "$FFMPEG_BIN" /tmp/eigeninference-bundle/bin/ffmpeg

          PYTHON_LOAD_PATH=$(otool -L /tmp/eigeninference-bundle/bin/darkbloom | awk '/libpython3\.12\.dylib/ {print $1; exit}')
          if [ -z "$PYTHON_LOAD_PATH" ]; then
            echo "ERROR: could not find libpython linkage in darkbloom"
            exit 1
          fi
          install_name_tool -change \
            "$PYTHON_LOAD_PATH" \
            "@executable_path/../python/lib/libpython3.12.dylib" \
            /tmp/eigeninference-bundle/bin/darkbloom

          # Verify it's a real binary before signing
          file "$FFMPEG_BIN" | grep -q "Mach-O" || { echo "ERROR: ffmpeg is not a Mach-O binary"; exit 1; }

          # Code sign ffmpeg with our Developer ID for distribution
          # Standard practice: we are the distributor, not claiming authorship
          codesign --force --sign "$DEVELOPER_ID" \
            --keychain "$KEYCHAIN_PATH" \
            --options runtime \
            --timestamp \
            /tmp/eigeninference-bundle/bin/ffmpeg
          codesign --verify --verbose /tmp/eigeninference-bundle/bin/ffmpeg

          # Image generation support disabled — re-enable when ready
          # cp /tmp/gRPCServerCLI /tmp/eigeninference-bundle/
          # mkdir -p /tmp/eigeninference-bundle/image-bridge
          # cp -r image-bridge/eigeninference_image_bridge /tmp/eigeninference-bundle/image-bridge/eigeninference_image_bridge

          # Code sign with Developer ID (hardened runtime + entitlements)
          codesign --force --sign "$DEVELOPER_ID" \
            --keychain "$KEYCHAIN_PATH" \
            --entitlements scripts/entitlements.plist \
            --options runtime \
            /tmp/eigeninference-bundle/bin/darkbloom

          codesign --force --sign "$DEVELOPER_ID" \
            --keychain "$KEYCHAIN_PATH" \
            --entitlements scripts/entitlements.plist \
            --options runtime \
            /tmp/eigeninference-bundle/bin/eigeninference-enclave

          # Image generation support disabled — re-enable when ready
          # codesign --force --sign "$DEVELOPER_ID" \
          #   --keychain "$KEYCHAIN_PATH" \
          #   --entitlements scripts/entitlements.plist \
          #   --options runtime \
          #   /tmp/eigeninference-bundle/gRPCServerCLI

          # Verify all signatures
          codesign --verify --verbose /tmp/eigeninference-bundle/bin/darkbloom
          codesign --verify --verbose /tmp/eigeninference-bundle/bin/eigeninference-enclave
          # codesign --verify --verbose /tmp/eigeninference-bundle/gRPCServerCLI

          cd /tmp && tar czf eigeninference-bundle-macos-arm64.tar.gz -C eigeninference-bundle .
          echo "Bundle created: $(du -h /tmp/eigeninference-bundle-macos-arm64.tar.gz | cut -f1)"

      # --- Notarize ---

      - name: Notarize binaries
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: "SLDQ2GJ6TL"
        run: |
          # Create a zip for notarization (notarytool needs zip/dmg/pkg)
          ditto -c -k --keepParent /tmp/eigeninference-bundle /tmp/eigeninference-notarize.zip

          xcrun notarytool submit /tmp/eigeninference-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 10m

          # Staple the individual binaries
          xcrun stapler staple /tmp/eigeninference-bundle/bin/darkbloom || true
          xcrun stapler staple /tmp/eigeninference-bundle/bin/eigeninference-enclave || true
          # xcrun stapler staple /tmp/eigeninference-bundle/gRPCServerCLI || true  # image support disabled
          xcrun stapler staple /tmp/eigeninference-bundle/bin/ffmpeg || true

          # Recreate tarball with stapled binaries
          cd /tmp && tar czf eigeninference-bundle-macos-arm64.tar.gz -C eigeninference-bundle .

      # --- Compute hashes (AFTER signing — the signed binary is what providers run) ---

      - name: Compute hashes
        id: hash
        run: |
          BINARY_HASH=$(shasum -a 256 /tmp/eigeninference-bundle/bin/darkbloom | cut -d' ' -f1)
          BUNDLE_HASH=$(shasum -a 256 /tmp/eigeninference-bundle-macos-arm64.tar.gz | cut -d' ' -f1)
          echo "binary_hash=$BINARY_HASH" >> "$GITHUB_OUTPUT"
          echo "bundle_hash=$BUNDLE_HASH" >> "$GITHUB_OUTPUT"
          echo "Binary hash (signed): $BINARY_HASH"
          echo "Bundle hash: $BUNDLE_HASH"

          # Image generation support disabled — re-enable when ready
          # GRPC_HASH=$(shasum -a 256 /tmp/eigeninference-bundle/gRPCServerCLI | cut -d' ' -f1)
          # echo "grpc_binary_hash=$GRPC_HASH" >> "$GITHUB_OUTPUT"
          echo "grpc_binary_hash=" >> "$GITHUB_OUTPUT"
          echo "image_bridge_hash=" >> "$GITHUB_OUTPUT"

          # Hash ffmpeg (signed)
          FFMPEG_HASH=$(shasum -a 256 /tmp/eigeninference-bundle/bin/ffmpeg | cut -d' ' -f1)
          echo "ffmpeg_hash=$FFMPEG_HASH" >> "$GITHUB_OUTPUT"
          echo "ffmpeg hash (signed): $FFMPEG_HASH"

      # --- Compute runtime integrity hashes ---
      # Build a temp Python venv with our fork to compute reference hashes.
      # The venv is NOT shipped — providers self-heal at startup.
      # We only need the hashes for the coordinator's manifest.

      - name: Build and hash canonical Python runtime
        id: runtime
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Download portable Python from python-build-standalone (Astral).
          # These binaries are self-contained — no dylib dependencies on system frameworks.
          # Works on ANY macOS ARM64 machine regardless of what Python is installed.
          echo "Downloading portable Python ${PBS_PYTHON_VERSION}..."
          curl -fsSL "https://github.com/astral-sh/python-build-standalone/releases/download/${PBS_TAG}/cpython-${PBS_PYTHON_VERSION}+${PBS_TAG}-aarch64-apple-darwin-install_only.tar.gz" \
            -o /tmp/pbs-python.tar.gz
          tar xzf /tmp/pbs-python.tar.gz -C /tmp/
          mv /tmp/python /tmp/eigeninference-python
          rm -f /tmp/pbs-python.tar.gz

          # Download the fork source and save it — this exact zip is uploaded
          # to R2 so providers can pip-install the same artifact during self-heal.
          curl -fsSL -o /tmp/vllm-mlx-source.zip \
            'https://github.com/Gajesh2007/vllm-mlx/archive/refs/heads/main.zip'

          # Upgrade pip and install packages
          /tmp/eigeninference-python/bin/python3.12 -m pip install --upgrade pip --quiet
          # Install vllm-mlx and all deps in one call so pip resolves constraints together.
          # mlx-lm>=0.31.2 is critical — older versions lack GenerationBatch API.
          /tmp/eigeninference-python/bin/python3.12 -m pip install --quiet --no-cache-dir \
            'mlx-lm>=0.31.2' \
            /tmp/vllm-mlx-source.zip \
            grpcio flatbuffers soundfile mlx-audio
          # Force-upgrade mlx-lm in case a transitive dep pinned an older version
          /tmp/eigeninference-python/bin/python3.12 -m pip install --quiet --no-cache-dir --upgrade 'mlx-lm>=0.31.2'

          # Verify packages work and vllm-mlx can actually import (catches version mismatches)
          /tmp/eigeninference-python/bin/python3.12 -c "import vllm_mlx; print(f'vllm-mlx {vllm_mlx.__version__}')"
          /tmp/eigeninference-python/bin/python3.12 -c "import mlx_lm; print(f'mlx-lm {mlx_lm.__version__}')"
          /tmp/eigeninference-python/bin/python3.12 -c "from vllm_mlx.server import app; print('vllm-mlx server imports OK')"

          # Strip unnecessary packages to keep it small (keep pip — providers need it)
          cd /tmp/eigeninference-python/lib/python*/site-packages
          rm -rf torch* gradio* opencv* cv2* pandas* pyarrow* \
                 sympy* networkx* mcp* miniaudio* pydub* datasets*
          # Purge ALL .pyc and __pycache__ first, then precompile deterministically.
          # This ensures: (1) no stale .pyc from PBS or pip installs, (2) all .pyc
          # are compiled by the same Python version, (3) providers hash identical files
          # because they receive the pre-compiled .pyc in the tarball.
          find /tmp/eigeninference-python -name __pycache__ -type d -exec rm -rf {} + 2>/dev/null || true
          find /tmp/eigeninference-python -name "*.pyc" -delete 2>/dev/null || true
          # Precompile all .py files — .pyc is now part of the verified package
          /tmp/eigeninference-python/bin/python3.12 -m compileall -q /tmp/eigeninference-python/lib/python3.12/site-packages/ 2>/dev/null || true
          # Remove EXTERNALLY-MANAGED marker so pip works without --break-system-packages
          rm -f /tmp/eigeninference-python/lib/python*/EXTERNALLY-MANAGED
          # Sign libpython and extension modules so the hardened provider can load them.
          find /tmp/eigeninference-python -type f | while read -r file; do
            if file "$file" | grep -q "Mach-O"; then
              codesign --force --sign "$DEVELOPER_ID" \
                --keychain "$KEYCHAIN_PATH" \
                --options runtime \
                "$file"
            fi
          done
          cd -

          # Hash the Python binary (this is what providers must match)
          # Hash python3.12 specifically — must match what compute_runtime_hashes() hashes on providers
          PYTHON_BIN="/tmp/eigeninference-python/bin/python3.12"
          PYTHON_HASH=$(shasum -a 256 "$PYTHON_BIN" | cut -d' ' -f1)
          echo "Python hash: $PYTHON_HASH"

          # Hash EVERY file in site-packages (must match Rust hash_files_sorted algorithm).
          # This covers .py source, .so compiled extensions (mlx GPU backend, tokenizers),
          # .dylib libraries, config files — everything. Any tampered file is detected.
          SITE_PACKAGES_DIR=$(/tmp/eigeninference-python/bin/python3.12 -c "import site; print(site.getsitepackages()[0])")
          echo "Hashing all files in: $SITE_PACKAGES_DIR"
          RUNTIME_HASH=$(/tmp/eigeninference-python/bin/python3 -c "
          import hashlib, os, sys
          d = sys.argv[1]
          files = sorted(
              os.path.join(r, f)
              for r, _, fs in os.walk(d)
              for f in fs
          )
          print(f'Total files: {len(files)}', file=sys.stderr)
          final = hashlib.sha256()
          for path in files:
              h = hashlib.sha256()
              with open(path, 'rb') as fh:
                  while True:
                      chunk = fh.read(65536)
                      if not chunk:
                          break
                      h.update(chunk)
              final.update(h.digest())
          print(final.hexdigest())
          " "$SITE_PACKAGES_DIR")
          echo "Runtime hash (all site-packages): $RUNTIME_HASH"

          # Tar the full Python runtime for R2 upload
          echo "Packaging Python runtime..."
          cd /tmp && tar czf eigeninference-python-macos-arm64.tar.gz -C eigeninference-python .
          PYTHON_TARBALL_SIZE=$(du -h eigeninference-python-macos-arm64.tar.gz | cut -f1)
          echo "Python runtime: $PYTHON_TARBALL_SIZE"

          # Tar just site-packages separately — providers download this for self-heal.
          # This is the canonical set of ALL Python packages with verified integrity.
          echo "Packaging site-packages..."
          cd /tmp && tar czf eigeninference-site-packages.tar.gz -C "$SITE_PACKAGES_DIR" .
          SITE_PKG_SIZE=$(du -h eigeninference-site-packages.tar.gz | cut -f1)
          echo "Site-packages tarball: $SITE_PKG_SIZE"

          # Upload Python runtime to R2 (providers download this)
          aws s3 cp /tmp/eigeninference-python-macos-arm64.tar.gz \
            "s3://d-inf-app/releases/v${VERSION}/eigeninference-python-macos-arm64.tar.gz" \
            --endpoint-url "$R2_ENDPOINT"
          echo "Python runtime uploaded to R2"

          # Upload site-packages tarball — providers use this for self-heal
          aws s3 cp /tmp/eigeninference-site-packages.tar.gz \
            "s3://d-inf-app/releases/v${VERSION}/eigeninference-site-packages.tar.gz" \
            --endpoint-url "$R2_ENDPOINT"
          echo "Site-packages uploaded to R2"

          # Upload the vllm-mlx source zip as fallback for older providers.
          aws s3 cp /tmp/vllm-mlx-source.zip \
            "s3://d-inf-app/releases/v${VERSION}/vllm-mlx-source.zip" \
            --endpoint-url "$R2_ENDPOINT"
          echo "vllm-mlx source zip uploaded to R2"

          # Compute template hashes from R2 CDN
          R2_CDN="https://pub-7cbee059c80c46ec9c071dbee2726f8a.r2.dev"
          TEMPLATE_HASHES=""
          for name in qwen3.5 trinity gemma4 minimax; do
            HASH=$(curl -fsSL "$R2_CDN/templates/${name}.jinja" 2>/dev/null | shasum -a 256 | cut -d' ' -f1)
            if [ -n "$HASH" ] && [ "$HASH" != "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]; then
              [ -n "$TEMPLATE_HASHES" ] && TEMPLATE_HASHES+=","
              TEMPLATE_HASHES+="${name}=${HASH}"
              echo "Template $name: ${HASH:0:16}..."
            fi
          done

          echo "python_hash=$PYTHON_HASH" >> "$GITHUB_OUTPUT"
          echo "runtime_hash=$RUNTIME_HASH" >> "$GITHUB_OUTPUT"
          echo "template_hashes=$TEMPLATE_HASHES" >> "$GITHUB_OUTPUT"

      # --- Upload to R2 ---

      - name: Install AWS CLI
        run: |
          brew install awscli 2>/dev/null || true

      - name: Upload bundle to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          aws s3 cp /tmp/eigeninference-bundle-macos-arm64.tar.gz \
            "s3://d-inf-app/releases/v${VERSION}/eigeninference-bundle-macos-arm64.tar.gz" \
            --endpoint-url "$R2_ENDPOINT"
          echo "Uploaded to R2: releases/v${VERSION}/eigeninference-bundle-macos-arm64.tar.gz"

      # --- Build macOS App (DMG) ---

      - name: Build macOS app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd app/EigenInference
          swift build -c release 2>&1 | tail -3
          APP_BIN=$(swift build -c release --show-bin-path)/EigenInference
          cd "$GITHUB_WORKSPACE"

          # Create app bundle
          APP_DIR="/tmp/EigenInference.app"
          CONTENTS="$APP_DIR/Contents"
          MACOS="$CONTENTS/MacOS"
          RESOURCES="$CONTENTS/Resources"
          PYTHON_ROOT="$CONTENTS/python"
          rm -rf "$APP_DIR"
          mkdir -p "$MACOS" "$RESOURCES" "$PYTHON_ROOT"

          # Info.plist
          cat > "$CONTENTS/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>EigenInference</string>
            <key>CFBundleDisplayName</key><string>EigenInference</string>
            <key>CFBundleIdentifier</key><string>io.darkbloom.provider</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>EigenInference</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>LSUIElement</key><true/>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          # Copy binaries (same signed binaries as CLI bundle)
          cp "$APP_BIN" "$MACOS/EigenInference"
          cp /tmp/eigeninference-bundle/bin/darkbloom "$MACOS/darkbloom"
          cp /tmp/eigeninference-bundle/bin/eigeninference-enclave "$MACOS/eigeninference-enclave" 2>/dev/null || true
          cp provider/stt_server.py "$MACOS/stt_server.py"
          cp -a /tmp/eigeninference-python/. "$PYTHON_ROOT/"

          find "$PYTHON_ROOT" -type f | while read -r file; do
            if file "$file" | grep -q "Mach-O"; then
              codesign --force --options runtime \
                --sign "$DEVELOPER_ID" "$file"
            fi
          done

          # Sign all binaries with Hardened Runtime
          for bin in "$MACOS"/*; do
            codesign --force --options runtime \
              --entitlements scripts/entitlements.plist \
              --sign "$DEVELOPER_ID" "$bin"
          done
          codesign --force --options runtime --no-strict \
            --entitlements scripts/entitlements.plist \
            --sign "$DEVELOPER_ID" "$APP_DIR"

          # Create DMG
          DMG_TMP="/tmp/dmg-staging"
          rm -rf "$DMG_TMP"
          mkdir -p "$DMG_TMP"
          cp -a "$APP_DIR" "$DMG_TMP/"
          ln -s /Applications "$DMG_TMP/Applications"
          hdiutil create -volname "Darkbloom" -srcfolder "$DMG_TMP" \
            -ov -format UDZO "/tmp/Darkbloom.dmg" >/dev/null
          rm -rf "$DMG_TMP"

          # Notarize DMG
          xcrun notarytool submit "/tmp/Darkbloom.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait || true
          xcrun stapler staple "/tmp/Darkbloom.dmg" || true

          echo "DMG_SIZE=$(du -h /tmp/Darkbloom.dmg | cut -f1)" >> $GITHUB_ENV
          echo "DMG built: $(du -h /tmp/Darkbloom.dmg | cut -f1)"
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: "SLDQ2GJ6TL"

      - name: Upload DMG to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Versioned
          aws s3 cp /tmp/Darkbloom.dmg \
            "s3://d-inf-app/releases/v${VERSION}/Darkbloom.dmg" \
            --endpoint-url "$R2_ENDPOINT"
          # Latest (stable URL for website download button)
          aws s3 cp /tmp/Darkbloom.dmg \
            "s3://d-inf-app/releases/latest/Darkbloom.dmg" \
            --endpoint-url "$R2_ENDPOINT"
          echo "DMG uploaded to R2: releases/v${VERSION}/Darkbloom.dmg + releases/latest/Darkbloom.dmg"

      # --- Register with coordinator ---

      - name: Register release with coordinator
        env:
          COORDINATOR_URL: ${{ secrets.COORDINATOR_URL }}
          RELEASE_KEY: ${{ secrets.DGINF_RELEASE_KEY }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE_URL="${R2_PUBLIC_URL}/releases/v${VERSION}/eigeninference-bundle-macos-arm64.tar.gz"

          # Extract annotated tag message for changelog.
          TAG_MSG=$(git tag -l --format='%(contents:subject)%0a%(contents:body)' "$GITHUB_REF_NAME" 2>/dev/null || echo "")
          if [ -z "$TAG_MSG" ] || [ "$TAG_MSG" = $'\n' ]; then
            TAG_MSG="Release v${VERSION}"
          fi

          # Use python3 to build JSON safely (handles escaping).
          python3 -c "
          import json, subprocess, sys
          payload = {
              'version': '${VERSION}',
              'platform': 'macos-arm64',
              'binary_hash': '${{ steps.hash.outputs.binary_hash }}',
              'bundle_hash': '${{ steps.hash.outputs.bundle_hash }}',
              'python_hash': '${{ steps.runtime.outputs.python_hash }}',
              'runtime_hash': '${{ steps.runtime.outputs.runtime_hash }}',
              'template_hashes': '${{ steps.runtime.outputs.template_hashes }}',
              'grpc_binary_hash': '${{ steps.hash.outputs.grpc_binary_hash }}',
              'image_bridge_hash': '${{ steps.hash.outputs.image_bridge_hash }}',
              'ffmpeg_hash': '${{ steps.hash.outputs.ffmpeg_hash }}',
              'url': '${BUNDLE_URL}',
              'changelog': '''${TAG_MSG}'''.strip()
          }
          print(json.dumps(payload))
          " > /tmp/release-payload.json

          curl -fsSL -X POST "${COORDINATOR_URL}/v1/releases" \
            -H "Authorization: Bearer ${RELEASE_KEY}" \
            -H "Content-Type: application/json" \
            -d @/tmp/release-payload.json
          echo ""
          echo "Release v${VERSION} registered with coordinator"

      # --- Cleanup keychain ---

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      # --- GitHub Release ---

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            /tmp/eigeninference-bundle-macos-arm64.tar.gz
            /tmp/EigenInference.dmg
          generate_release_notes: true
          body: |
            ## Provider v${{ github.ref_name }}

            **Binary hash (signed):** `${{ steps.hash.outputs.binary_hash }}`
            **Bundle hash:** `${{ steps.hash.outputs.bundle_hash }}`
            **Runtime hash (vllm-mlx):** `${{ steps.runtime.outputs.runtime_hash }}`
            **gRPCServerCLI hash:** `${{ steps.hash.outputs.grpc_binary_hash }}`
            **ffmpeg hash (signed):** `${{ steps.hash.outputs.ffmpeg_hash }}`
            **Signed by:** Developer ID Application: Eigen Labs, Inc. (SLDQ2GJ6TL)
            **Notarized:** Yes

            ### Install
            ```bash
            curl -fsSL https://api.darkbloom.dev/install.sh | bash
            ```
