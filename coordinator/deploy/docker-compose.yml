services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: dginf
      POSTGRES_USER: dginf
      POSTGRES_PASSWORD: dginf-dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  coordinator:
    build: ../
    ports:
      - "8080:8080"
    environment:
      DGINF_PORT: "8080"
      DGINF_ADMIN_KEY: "${DGINF_ADMIN_KEY}"
      DGINF_DATABASE_URL: "postgres://dginf:dginf-dev@postgres:5432/dginf?sslmode=disable"
    depends_on:
      - postgres

volumes:
  pgdata:
