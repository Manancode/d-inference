services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: eigeninference
      POSTGRES_USER: eigeninference
      POSTGRES_PASSWORD: eigeninference-dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  coordinator:
    build: ../
    ports:
      - "8080:8080"
    environment:
      EIGENINFERENCE_PORT: "8080"
      EIGENINFERENCE_ADMIN_KEY: "${EIGENINFERENCE_ADMIN_KEY}"
      EIGENINFERENCE_DATABASE_URL: "postgres://eigeninference:eigeninference-dev@postgres:5432/eigeninference?sslmode=disable"
    depends_on:
      - postgres

volumes:
  pgdata:
